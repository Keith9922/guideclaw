# OpenClaw 工作区配置模板
#
# 说明：
# - 这是模板，不是可直接提交给全局配置的文件
# - 采用全局 OpenClaw CLI + 当前仓库 workspace skills 的方式
# - 不 vendoring OpenClaw 官方源码

workspace:
  root: "${WORKSPACE_ROOT}"
  skillsDir: "${WORKSPACE_ROOT}/skills"

runtime:
  skillsMode: workspace
  channelMode: cli
  memoryMode: external

backend:
  apiBaseUrl: "${GUIDECLAW_API_BASE_URL}"
  projectId: "${GUIDECLAW_PROJECT_ID}"
  bohriumAccessKey: "${BOHRIUM_ACCESS_KEY}"
  llmProvider: minimax
  llmBaseUrl: "${MINIMAX_BASE_URL}"
  llmModel: "${MINIMAX_MODEL}"

integrations:
  grobid:
    enabled: true
    baseUrl: "${GROBID_BASE_URL}"
  pyalex:
    enabled: true
    apiBaseUrl: "${PYALEX_API_BASE_URL}"
  paperqa:
    enabled: true
    serviceUrl: "${PAPERQA_SERVICE_URL}"

skills:
  - id: guideclaw-principal-investigator
    path: "${WORKSPACE_ROOT}/skills/guideclaw-principal-investigator"
  - id: guideclaw-literature-assistant
    path: "${WORKSPACE_ROOT}/skills/guideclaw-literature-assistant"
  - id: guideclaw-gap-analyst
    path: "${WORKSPACE_ROOT}/skills/guideclaw-gap-analyst"
  - id: guideclaw-study-designer
    path: "${WORKSPACE_ROOT}/skills/guideclaw-study-designer"
  - id: guideclaw-meeting-secretary
    path: "${WORKSPACE_ROOT}/skills/guideclaw-meeting-secretary"
  - id: bohrium-paper-search
    path: "${WORKSPACE_ROOT}/skills/bohrium-paper-search"
  - id: bohrium-pdf-parser
    path: "${WORKSPACE_ROOT}/skills/bohrium-pdf-parser"
  - id: bohrium-knowledge-base
    path: "${WORKSPACE_ROOT}/skills/bohrium-knowledge-base"
  - id: web-search
    path: "${WORKSPACE_ROOT}/skills/web-search"
  - id: proposal-agent
    path: "${WORKSPACE_ROOT}/skills/proposal-agent"
  - id: preparation-agent
    path: "${WORKSPACE_ROOT}/skills/preparation-agent"
